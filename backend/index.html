<!DOCTYPE html>
<html>
<head>
  <title>CI/CD Dashboard</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f1c2a, #1e283b);
      color: #e2e8f0;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      padding: 20px;
      font-size: 32px;
      letter-spacing: 1px;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      width: 85%;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    h3 {
      margin-bottom: 10px;
    }

    .status-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 14px;
    }

    .success {
      background: #16a34a;
      color: white;
    }

    .failed {
      background: #dc2626;
      color: white;
    }

    .running {
      background: #facc15;
      color: black;
    }

    .idle {
      background: #64748b;
      color: white;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    pre {
      background: #020617;
      padding: 15px;
      border-radius: 12px;
      height: 250px;
      overflow-y: auto;
      font-size: 13px;
      border: 1px solid #334155;
    }

    .logs {
      height: 300px;
    }

    .footer {
      text-align: center;
      margin: 20px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<h1>CI/CD Dashboard </h1>

<div class="container">

  <div class="card">
    <div class="info-row">
      <h3>Status:</h3>
      <span id="status" class="status-badge idle">Loading...</span>
    </div>
    <p>Last Run: <span id="time"></span></p>
  </div>

  <div class="card">
    <h3>📂 Changed Files</h3>
    <pre id="changes"></pre>
  </div>

  <div class="card">
    <h3>📜 Logs</h3>
    <pre id="logs" class="logs"></pre>
  </div>

</div>

<div class="footer">
  Built with Flask + Docker by Sumit Baghel 🚀
</div>

<script>
async function loadData() {
  try {
    const res = await fetch("/status");
    const data = await res.json();

    const statusEl = document.getElementById("status");

    statusEl.innerText = data.status;

    // Reset classes
    statusEl.className = "status-badge";

    if (data.status === "success") {
      statusEl.classList.add("success");
    } else if (data.status === "failed") {
      statusEl.classList.add("failed");
    } else if (data.status === "running") {
      statusEl.classList.add("running");
    } else {
      statusEl.classList.add("idle");
    }

    document.getElementById("time").innerText = data.time || "—";
    document.getElementById("changes").innerText = data.changes || "None";

    const logsRes = await fetch("/logs");
    let logs = await logsRes.text();

    logs = logs.replace(/  +/g, ' ');
    const logsBox = document.getElementById("logs");

    logsBox.innerText = logs;

    // Auto scroll logs to bottom
    logsBox.scrollTop = logsBox.scrollHeight;

  } catch (err) {
    console.error("Error loading dashboard:", err);
  }
}

setInterval(loadData, 3000);
loadData();
</script>

</body>
</html>
