<!DOCTYPE html>
<html>
<head>
  <title>CI/CD Dashboard</title>

  <style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: #e2e8f0;
    margin: 0;
    padding: 0;
  }

  h1 {
    text-align: center;
    padding: 25px;
    font-size: 36px;
    font-weight: bold;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #38bdf8, #818cf8, #22c55e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .container {
    width: 95%;
    max-width: 1100px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 25px;
  }

  .card {
    background: rgba(15, 23, 42, 0.75);
    backdrop-filter: blur(12px);
    padding: 22px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.05);
    box-shadow: 0 10px 35px rgba(0,0,0,0.7);
    transition: all 0.3s ease;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 50px rgba(0,0,0,0.9);
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* 🔥 STATUS BADGE */
  .status-badge {
    padding: 8px 18px;
    border-radius: 25px;
    font-weight: bold;
    font-size: 14px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
  }

  .success {
    background: #16a34a;
    box-shadow: 0 0 12px #22c55e;
  }

  .failed {
    background: #dc2626;
    box-shadow: 0 0 12px #ef4444;
  }

  .running {
    background: #eab308;
    color: black;
    animation: pulse 1.2s infinite;
  }

  .idle {
    background: #475569;
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.7; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* 🔥 TERMINAL STYLE */
  pre {
    background: #000000;
    padding: 16px;
    border-radius: 12px;
    height: 260px;
    overflow-x: auto;
    overflow-y: auto;
    font-size: 13px;
    border: 1px solid #1e293b;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: "Courier New", monospace;
    color: #22c55e;
  }

  .logs {
    height: 320px;
  }

  /* Scrollbar */
  pre::-webkit-scrollbar {
    width: 6px;
  }

  pre::-webkit-scrollbar-thumb {
    background: #334155;
    border-radius: 10px;
  }

  pre::-webkit-scrollbar-thumb:hover {
    background: #64748b;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin: 25px;
    font-size: 12px;
    color: #64748b;
  }

  </style>
</head>

<body>

<h1>🚀 CI/CD Dashboard</h1>

<div class="container">

  <div class="card">
    <div class="info-row">
      <h3>Status</h3>
      <span id="status" class="status-badge idle">Loading...</span>
    </div>
    <p>Last Run: <span id="time"></span></p>
  </div>

  <div class="card">
    <h3>📂 Changed Files</h3>
    <pre id="changes"></pre>
  </div>

  <div class="card">
    <h3>📜 Logs</h3>
    <pre id="logs" class="logs"></pre>
  </div>

</div>

<div class="footer">
  Built with Flask + Docker ⚡ by Sumit
</div>

<script>
async function loadData() {
  try {
    const res = await fetch("/status");
    const data = await res.json();

    const statusEl = document.getElementById("status");

    statusEl.innerText = data.status;
    statusEl.className = "status-badge";

    if (data.status === "success") {
      statusEl.classList.add("success");
    } else if (data.status === "failed") {
      statusEl.classList.add("failed");
    } else if (data.status === "running") {
      statusEl.classList.add("running");
    } else {
      statusEl.classList.add("idle");
    }

    document.getElementById("time").innerText = data.time || "—";
    document.getElementById("changes").innerText = data.changes || "None";

    const logsRes = await fetch("/logs");
    let logs = await logsRes.text();

    const logsBox = document.getElementById("logs");
    logsBox.innerText = logs;

    logsBox.scrollTop = logsBox.scrollHeight;

  } catch (err) {
    console.error("Error:", err);
  }
}

setInterval(loadData, 3000);
loadData();
</script>

</body>
</html>
