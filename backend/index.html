<!DOCTYPE html>
<html>
<head>
  <title>CI/CD Dashboard</title>

  <style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1a1a3a, #0a0f1f);
    color: #e2e8f0;
    margin: 0;
    padding: 0;
  }

  h1 {
    text-align: center;
    padding: 20px;
    font-size: 34px;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #38bdf8, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .container {
    width: 95%;
    max-width: 1000px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    transition: all 0.25s ease;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .card:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 15px 40px rgba(0,0,0,0.8);
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .status-badge {
    padding: 6px 16px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 13px;
    letter-spacing: 0.5px;
  }

  .success {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
  }

  .failed {
    background: linear-gradient(135deg, #ef4444, #b91c1c);
    color: white;
  }

  .running {
    background: linear-gradient(135deg, #facc15, #eab308);
    color: black;
    animation: pulse 1.5s infinite;
  }

  .idle {
    background: linear-gradient(135deg, #64748b, #475569);
    color: white;
  }

  @keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.6; }
    100% { opacity: 1; }
  }

  pre {
    background: #020617;
    padding: 15px;
    border-radius: 12px;
    height: 250px;
    overflow-x: auto;
    overflow-y: auto;
    font-size: 13px;
    border: 1px solid #334155;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .logs {
    height: 300px;
  }

  /* 🔥 Custom Scrollbar */
  pre::-webkit-scrollbar {
    width: 6px;
  }

  pre::-webkit-scrollbar-thumb {
    background: #475569;
    border-radius: 10px;
  }

  pre::-webkit-scrollbar-thumb:hover {
    background: #64748b;
  }

  .footer {
    text-align: center;
    margin: 20px;
    font-size: 12px;
    color: #94a3b8;
  }
</style>
</head>

<body>

<h1>CI/CD Dashboard </h1>

<div class="container">

  <div class="card">
    <div class="info-row">
      <h3>Status:</h3>
      <span id="status" class="status-badge idle">Loading...</span>
    </div>
    <p>Last Run: <span id="time"></span></p>
  </div>

  <div class="card">
    <h3>📂 Changed Files</h3>
    <pre id="changes"></pre>
  </div>

  <div class="card">
    <h3>📜 Logs</h3>
    <pre id="logs" class="logs"></pre>
  </div>

</div>

<div class="footer">
  Built with Flask + Docker by Sumit Baghel 🚀
</div>

<script>
async function loadData() {
  try {
    const res = await fetch("/status");
    const data = await res.json();

    const statusEl = document.getElementById("status");

    statusEl.innerText = data.status;

    // Reset classes
    statusEl.className = "status-badge";

    if (data.status === "success") {
      statusEl.classList.add("success");
    } else if (data.status === "failed") {
      statusEl.classList.add("failed");
    } else if (data.status === "running") {
      statusEl.classList.add("running");
    } else {
      statusEl.classList.add("idle");
    }

    document.getElementById("time").innerText = data.time || "—";
    document.getElementById("changes").innerText = data.changes || "None";

    const logsRes = await fetch("/logs");
    let logs = await logsRes.text();

    logs = logs.replace(/  +/g, ' ');
    const logsBox = document.getElementById("logs");

    logsBox.innerText = logs;

    // Auto scroll logs to bottom
    logsBox.scrollTop = logsBox.scrollHeight;

  } catch (err) {
    console.error("Error loading dashboard:", err);
  }
}

setInterval(loadData, 3000);
loadData();
</script>

</body>
</html>
