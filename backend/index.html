<!DOCTYPE html>
<html>
<head>
  <title>CI/CD Dashboard</title>

  <style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f1a2a, #1e2a3b);
    color: #e2e8f0;
    margin: 0;
    padding: 0;
  }

  h1 {
    text-align: center;
    padding: 20px;
    font-size: 32px;
  }

  .container {
    width: 95%;
    max-width: 1000px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: #1e293b;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    overflow: hidden; /* 🔥 prevents overflow */
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .status-badge {
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 14px;
    white-space: nowrap;
  }

  .success { background: #16a34a; color: white; }
  .failed { background: #dc2626; color: white; }
  .running { background: #facc15; color: black; }
  .idle { background: #64748b; color: white; }

  pre {
    background: #020617;
    padding: 15px;
    border-radius: 12px;
    height: 250px;
    overflow-x: auto;   /* 🔥 horizontal scroll instead of stretch */
    overflow-y: auto;
    font-size: 13px;
    border: 1px solid #334155;
    white-space: pre-wrap;   /* 🔥 wrap long lines */
    word-break: break-word;  /* 🔥 break long words */
  }

  .logs {
    height: 300px;
  }

  .footer {
    text-align: center;
    margin: 20px;
    font-size: 12px;
    color: #94a3b8;
  }
</style>
</head>

<body>

<h1>CI/CD Dashboard </h1>

<div class="container">

  <div class="card">
    <div class="info-row">
      <h3>Status:</h3>
      <span id="status" class="status-badge idle">Loading...</span>
    </div>
    <p>Last Run: <span id="time"></span></p>
  </div>

  <div class="card">
    <h3>📂 Changed Files</h3>
    <pre id="changes"></pre>
  </div>

  <div class="card">
    <h3>📜 Logs</h3>
    <pre id="logs" class="logs"></pre>
  </div>

</div>

<div class="footer">
  Built with Flask + Docker by Sumit Baghel 🚀
</div>

<script>
async function loadData() {
  try {
    const res = await fetch("/status");
    const data = await res.json();

    const statusEl = document.getElementById("status");

    statusEl.innerText = data.status;

    // Reset classes
    statusEl.className = "status-badge";

    if (data.status === "success") {
      statusEl.classList.add("success");
    } else if (data.status === "failed") {
      statusEl.classList.add("failed");
    } else if (data.status === "running") {
      statusEl.classList.add("running");
    } else {
      statusEl.classList.add("idle");
    }

    document.getElementById("time").innerText = data.time || "—";
    document.getElementById("changes").innerText = data.changes || "None";

    const logsRes = await fetch("/logs");
    let logs = await logsRes.text();

    logs = logs.replace(/  +/g, ' ');
    const logsBox = document.getElementById("logs");

    logsBox.innerText = logs;

    // Auto scroll logs to bottom
    logsBox.scrollTop = logsBox.scrollHeight;

  } catch (err) {
    console.error("Error loading dashboard:", err);
  }
}

setInterval(loadData, 3000);
loadData();
</script>

</body>
</html>
