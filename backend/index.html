<!DOCTYPE html>
<html>
<head>
  <title>CI/CD Dashboard</title>

  <style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
    color: #e2e8f0;
  }

  @keyframes gradientMove {
    0% { background-position: 0% 50% }
    50% { background-position: 100% 50% }
    100% { background-position: 0% 50% }
  }

  h1 {
    text-align: center;
    padding: 20px;
    font-size: 36px;
    letter-spacing: 1px;
    color: #fff;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 95%;
    max-width: 1200px;
    margin: auto;
  }

  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    transition: 0.3s;
  }

  .card:hover {
    transform: translateY(-6px) scale(1.01);
    box-shadow: 0 15px 50px rgba(0,0,0,0.9);
  }

  .full {
    grid-column: span 2;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  h3 {
    margin: 0;
    font-weight: 500;
    color: #cbd5f5;
  }

  /* 🔥 STATUS STYLE */
  .status-badge {
    padding: 10px 20px;
    border-radius: 30px;
    font-weight: bold;
    letter-spacing: 1px;
    font-size: 13px;
  }

  .success {
    background: linear-gradient(135deg, #00ff99, #00cc66);
    color: black;
    box-shadow: 0 0 20px #00ff99;
  }

  .failed {
    background: linear-gradient(135deg, #ff4d4d, #cc0000);
    box-shadow: 0 0 20px #ff4d4d;
  }

  .running {
    background: linear-gradient(135deg, #ffd633, #ffaa00);
    color: black;
    animation: pulse 1s infinite;
  }

  .idle {
    background: linear-gradient(135deg, #64748b, #334155);
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  /* 🔥 TERMINAL LOOK */
  pre {
    background: #000;
    color: #00ff9c;
    padding: 15px;
    border-radius: 12px;
    height: 260px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 13px;
    border: 1px solid #0f172a;
  }

  .logs {
    height: 320px;
  }

  /* SCROLLBAR */
  pre::-webkit-scrollbar {
    width: 6px;
  }

  pre::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 10px;
  }

  .footer {
    text-align: center;
    margin: 20px;
    font-size: 12px;
    opacity: 0.7;
  }

  </style>
</head>

<body>

<h1>CI/CD Dashboard</h1>

<div class="container">

  <div class="card">
    <div class="info-row">
      <h3>System Status</h3>
      <span id="status" class="status-badge idle">Loading</span>
    </div>
    <p>Last Run: <span id="time"></span></p>
  </div>

  <div class="card">
    <h3>Changed Files</h3>
    <pre id="changes"></pre>
  </div>

  <div class="card full">
    <h3>Deployment Logs</h3>
    <pre id="logs" class="logs"></pre>
  </div>

</div>

<div class="footer">
  CI/CD Monitoring Dashboard
</div>

<script>
async function loadData() {
  try {
    const res = await fetch("/status");
    const data = await res.json();

    const statusEl = document.getElementById("status");

    statusEl.innerText = data.status;
    statusEl.className = "status-badge";

    if (data.status === "success") {
      statusEl.classList.add("success");
    } else if (data.status === "failed") {
      statusEl.classList.add("failed");
    } else if (data.status === "running") {
      statusEl.classList.add("running");
    } else {
      statusEl.classList.add("idle");
    }

    document.getElementById("time").innerText = data.time || "—";
    document.getElementById("changes").innerText = data.changes || "None";

    const logsRes = await fetch("/logs");
    let logs = await logsRes.text();

    const logsBox = document.getElementById("logs");
    logsBox.innerText = logs;
    logsBox.scrollTop = logsBox.scrollHeight;

  } catch (err) {
    console.error(err);
  }
}

setInterval(loadData, 3000);
loadData();
</script>

</body>
</html>
