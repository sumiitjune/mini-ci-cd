<!DOCTYPE html>
<html>
<head>
  <title>CI/CD Dashboard</title>

  <style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
  }

  h1 {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: 600;
    color: #f1f5f9;
  }

  .container {
    width: 95%;
    max-width: 1000px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: #1e293b;
    padding: 18px;
    border-radius: 12px;
    border: 1px solid #334155;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  h3 {
    margin: 0;
    font-size: 16px;
    font-weight: 500;
  }

  /* STATUS */
  .status-badge {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .success {
    background: #22c55e;
    color: #052e16;
  }

  .failed {
    background: #ef4444;
    color: #450a0a;
  }

  .running {
    background: #facc15;
    color: #422006;
  }

  .idle {
    background: #64748b;
    color: white;
  }

  /* TEXT BLOCK */
  pre {
    background: #020617;
    padding: 12px;
    border-radius: 8px;
    height: 220px;
    overflow-y: auto;
    font-size: 13px;
    border: 1px solid #1e293b;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: monospace;
  }

  .logs {
    height: 260px;
  }

  .footer {
    text-align: center;
    margin: 15px;
    font-size: 12px;
    color: #64748b;
  }

  </style>
</head>

<body>

<h1>Test CI/CD</h1>

<div class="container">

  <div class="card">
    <div class="info-row">
      <h3>Status</h3>
      <span id="status" class="status-badge idle">Loading</span>
    </div>
    <p style="margin-top:10px;">Last Run: <span id="time"></span></p>
  </div>

  <div class="card">
    <h3>Changed Files</h3>
    <pre id="changes"></pre>
  </div>

  <div class="card">
    <h3>Logs</h3>
    <pre id="logs" class="logs"></pre>
  </div>

</div>

<div class="footer">
  CI/CD Monitoring System
</div>

<script>
async function loadData() {
  try {
    const res = await fetch("/status");
    const data = await res.json();

    const statusEl = document.getElementById("status");

    statusEl.innerText = data.status;
    statusEl.className = "status-badge";

    if (data.status === "success") {
      statusEl.classList.add("success");
    } else if (data.status === "failed") {
      statusEl.classList.add("failed");
    } else if (data.status === "running") {
      statusEl.classList.add("running");
    } else {
      statusEl.classList.add("idle");
    }

    document.getElementById("time").innerText = data.time || "—";
    document.getElementById("changes").innerText = data.changes || "None";

    const logsRes = await fetch("/logs");
    const logs = await logsRes.text();

    const logsBox = document.getElementById("logs");
    logsBox.innerText = logs;
    logsBox.scrollTop = logsBox.scrollHeight;

  } catch (err) {
    console.error(err);
  }
}

setInterval(loadData, 3000);
loadData();
</script>

</body>
</html>
