<!DOCTYPE html>
<html>
<head>
  <title>CI/CD Dashboard</title>
</head>\
<body style="font-family: Arial; background:#111; color:white; text-align:center;">

<h1>🚀 CI/CD Dashboard</h1>

<h3>Status: <span id="status">Loading...</span></h3>
<p>Last Run: <span id="time"></span></p>

<h3>Changed Files:</h3>
<pre id="changes"></pre>

<h3>Logs:</h3>
<pre id="logs"></pre>

<script>
async function loadData() {
  const res = await fetch("http://localhost:5001/status");
  const data = await res.json();

  document.getElementById("status").innerText = data.status;
  document.getElementById("time").innerText = data.time;
  document.getElementById("changes").innerText = data.changes;

  const logs = await fetch("http://localhost:5001/logs");
  const logData = await logs.text();

  document.getElementById("logs").innerText = logData;
}

setInterval(loadData, 3000);
loadData();
</script>

</body>
</html>
